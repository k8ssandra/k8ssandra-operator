apiVersion: k8ssandra.io/v1alpha1
kind: K8ssandraCluster
metadata:
  name: test
spec:
  cassandra:
    clusterName: "E2E Test Cluster"
    serverVersion: 5.0.4
    storageConfig:
      cassandraDataVolumeClaimSpec:
        storageClassName: standard
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
    config:
      jvmOptions:
        heapSize: 512M
        heapNewGenSize: 256Mi
        gc: CMS
    networking:
      hostNetwork: true
    datacenters:
      - metadata:
          name: dc1
          namespace: separate-namespace
        k8sContext: kind-k8ssandra-0
        size: 2
      - metadata:
          name: dc2
        k8sContext: kind-k8ssandra-1
        size: 2
        datacenterName: real-dc2
    mgmtAPIHeap: 64Mi
  medusa:
    medusaConfigurationRef:
      name: test-medusa-configuration
    storageProperties:
      storageProvider: s3_compatible
      bucketName: k8ssandra-medusa
      prefix: test
      host: minio-service.minio.svc.cluster.local
      port: 9000
      secure: false
    serviceProperties:
      grpcPort: 55055
