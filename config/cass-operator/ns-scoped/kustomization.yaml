apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- github.com/k8ssandra/cass-operator/config/deployments/default?ref=v1.30.0

components:
  - ../imageconfig

patchesStrategicMerge:
- |-
  apiVersion: v1
  kind: Namespace
  metadata:
    name: cass-operator
  $patch: delete

patches:
  - target:
      kind: Deployment
      name: cass-operator-controller-manager
    patch: |-
      - op: replace
        path: /spec/selector/matchLabels
        value:
          control-plane: controller-manager
          name: cass-operator
